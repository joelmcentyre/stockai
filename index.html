<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#07080f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="StockAI"/>
<title>StockAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07080f; --s1:#0d0f1c; --s2:#131627; --s3:#191d33;
  --b1:#1f2440; --b2:#2a3060;
  --g:#00f0a0; --g2:rgba(0,240,160,.12); --g3:rgba(0,240,160,.05);
  --r:#ff3a5c; --r2:rgba(255,58,92,.12);
  --y:#ffc53d; --y2:rgba(255,197,61,.1);
  --bl:#5b8fff; --bl2:rgba(91,143,255,.12);
  --tx:#dce4ff; --mu:#4a5280; --fa:#1a1f3a;
  --mono:'JetBrains Mono',monospace;
  --sans:'Manrope',sans-serif;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --nh:58px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx)}
body{font-family:var(--sans);overscroll-behavior:none}
#root{display:flex;flex-direction:column;height:100%;height:100dvh}

/* ── HEADER ── */
#hdr{
  padding:calc(var(--st) + 12px) 16px 0;
  flex-shrink:0; position:relative; z-index:10;
  background:linear-gradient(180deg,var(--bg) 70%,transparent);
}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.hlabel{font-family:var(--mono);font-size:9px;color:var(--mu);letter-spacing:.2em;margin-bottom:4px}
.hval{font-family:var(--mono);font-size:32px;letter-spacing:-.025em;line-height:1}
.hsub{font-family:var(--mono);font-size:11px;margin-top:3px}
.hcash{font-family:var(--mono);font-size:19px}
.hmeta{font-size:10px;color:var(--mu);margin-top:3px}

/* ── TICKER ── */
#tkbar{
  height:25px;display:flex;align-items:center;overflow:hidden;
  background:var(--s1);border-top:1px solid var(--b1);border-bottom:1px solid var(--b1);
  margin:8px -16px 0;
}
.tkscroll{display:flex;gap:22px;white-space:nowrap;padding:0 12px;animation:tks 34s linear infinite}
@keyframes tks{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tki{font-family:var(--mono);font-size:10px;display:flex;gap:4px}
.tks2{color:var(--mu)}.tgu{color:var(--g)}.trd{color:var(--r)}

/* ── TABS ── */
#tabbar{display:flex;gap:6px;padding:10px 0 0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#tabbar::-webkit-scrollbar{display:none}
.tp{
  background:none;border:1px solid var(--b1);border-radius:18px;
  padding:7px 15px;font-size:12px;font-weight:600;color:var(--mu);
  cursor:pointer;white-space:nowrap;font-family:var(--sans);
  transition:all .18s;flex-shrink:0
}
.tp.on{background:var(--g2);border-color:var(--g);color:var(--g)}

/* ── CONTENT ── */
#pg{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:14px 16px calc(var(--nh) + var(--sb) + 18px);
  -webkit-overflow-scrolling:touch;
}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}

/* ── BOTTOM NAV ── */
#nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nh) + var(--sb));padding-bottom:var(--sb);
  background:rgba(7,8,15,.97);border-top:1px solid var(--b1);
  display:flex;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  z-index:100;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;background:none;border:none;
  cursor:pointer;color:var(--mu);font-size:9.5px;font-weight:600;
  font-family:var(--sans);letter-spacing:.04em;min-height:44px;
  transition:color .15s;
}
.nb.on{color:var(--g)}
.nbi{font-size:19px;line-height:1;transition:transform .15s}
.nb.on .nbi{transform:scale(1.15)}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:16px;margin-bottom:11px}
.cg{border-color:rgba(0,240,160,.2);background:linear-gradient(135deg,var(--g3),var(--s1))}
.cy{border-color:rgba(255,197,61,.2);background:linear-gradient(135deg,var(--y2),var(--s1))}
.cr{border-color:rgba(255,58,92,.2);background:linear-gradient(135deg,var(--r2),var(--s1))}
.cb{border-color:rgba(91,143,255,.2);background:linear-gradient(135deg,var(--bl2),var(--s1))}
.clabel{font-family:var(--mono);font-size:9px;color:var(--mu);letter-spacing:.18em;text-transform:uppercase;margin-bottom:11px}

/* ── BTNS ── */
.btn{width:100%;padding:15px;border:none;border-radius:13px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;min-height:52px;transition:transform .1s,opacity .12s}
.btn:active{transform:scale(.97);opacity:.88}
.btn:disabled{opacity:.35;cursor:default}
.btng{background:var(--g);color:#000}
.btno{background:none;border:1px solid var(--b1);color:var(--tx);font-size:13px;padding:11px 16px;border-radius:11px;cursor:pointer;font-family:var(--sans);min-height:44px;transition:background .15s;font-weight:600}
.btno:active{background:var(--fa)}
.bgo{border-color:var(--g);color:var(--g)}
.bro{border-color:var(--r);color:var(--r)}

/* ── ROWS ── */
.hrow2{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--b1)}
.hrow2:last-child{border-bottom:none}
.wrow{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--b1);gap:8px}
.wrow:last-child{border-bottom:none}

/* ── ACTION CARDS ── */
.ac{border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--b1)}
.ac.buy{background:var(--g3);border-color:rgba(0,240,160,.2)}
.ac.sell{background:var(--r2);border-color:rgba(255,58,92,.2)}
.abadge{display:inline-block;font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:5px;margin-right:8px}
.abg{background:var(--g2);color:var(--g)}
.abr{background:var(--r2);color:var(--r)}
.abh{background:var(--s3);color:var(--mu)}
.cbar{height:3px;border-radius:2px;background:var(--b1);margin-top:10px;overflow:hidden}
.cfill{height:100%;border-radius:2px;transition:width .7s ease}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.sb{background:var(--s2);border-radius:13px;padding:13px}
.sl{font-size:10px;color:var(--mu);margin-bottom:4px}
.sv{font-family:var(--mono);font-size:15px}

/* ── UPLOAD ── */
.uzone{
  border:2px dashed var(--b2);border-radius:16px;padding:28px 20px;
  text-align:center;cursor:pointer;position:relative;
  transition:border-color .2s,background .2s;
}
.uzone.drag{border-color:var(--bl);background:var(--bl2)}
.uzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.sprev{width:100%;border-radius:12px;max-height:220px;object-fit:cover;margin:12px 0;display:block}

/* ── MODAL ── */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(8px)}
.msheet{width:100%;background:var(--s1);border-radius:22px 22px 0 0;padding:20px 20px calc(var(--sb) + 24px);animation:sup .25s ease;border-top:1px solid var(--b2)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 20px}
.tinput{width:100%;padding:16px;background:var(--s2);border:1px solid var(--b1);border-radius:12px;font-family:var(--mono);font-size:22px;color:var(--tx);outline:none;text-align:center;margin-bottom:10px}
.tinput:focus{border-color:var(--g)}
.ttog{display:flex;gap:8px;margin-bottom:18px}
.ttb{flex:1;padding:11px;border-radius:9px;border:1px solid var(--b1);background:none;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--mu);cursor:pointer;transition:all .15s;min-height:44px}
.ttb.on{background:var(--g2);border-color:var(--g);color:var(--g)}
.trow{display:flex;gap:10px}

/* ── NOTIF ── */
.nrow{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--b1)}
.nrow:last-child{border-bottom:none}
.npill{display:inline-flex;align-items:center;gap:5px;border-radius:10px;padding:6px 11px;font-family:var(--mono);font-size:11px}
.npg{background:var(--g2);color:var(--g)}
.npy{background:var(--y2);color:var(--y)}
.npm{background:var(--s3);color:var(--mu)}

/* ── INSTALL BANNER ── */
.ibanner{
  background:linear-gradient(135deg,rgba(0,240,160,.08),rgba(91,143,255,.05));
  border:1px solid rgba(0,240,160,.2);border-radius:14px;
  padding:14px 16px;margin-bottom:12px;
  display:flex;justify-content:space-between;align-items:center;gap:12px
}

/* ── PROGRESS ── */
.pdots{display:flex;gap:7px;justify-content:center;margin:18px 0}
.pd{width:9px;height:9px;border-radius:50%;background:var(--b1);transition:background .3s,transform .3s}
.pd.on{background:var(--g);transform:scale(1.2)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--nh) + var(--sb) + 12px);
  left:16px;right:16px;padding:14px 18px;border-radius:13px;
  font-size:14px;font-weight:700;text-align:center;z-index:400;
  animation:fup .22s ease,fout .3s 2.6s ease forwards;
  font-family:var(--sans);
}
.tok{background:var(--g);color:#000}
.terr{background:var(--r);color:#fff}
.tinf{background:var(--bl);color:#fff}
@keyframes fup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fout{to{opacity:0;transform:translateY(-6px)}}

.fin{animation:fin .22s ease}
@keyframes fin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.rh{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:13px;background:linear-gradient(135deg,#00c805,#006e00);color:#fff;font-size:15px;font-weight:700;text-decoration:none;min-height:52px;margin-bottom:10px}
</style>
</head>
<body>
<div id="root">
  <div id="hdr">
    <div class="hrow">
      <div>
        <div class="hlabel">STOCKAI · <span id="mstat" style="color:var(--g)">—</span></div>
        <div class="hval">$<span id="tv" style="color:var(--g)">100.00</span></div>
        <div class="hsub" id="tvchg" style="color:var(--g)">▲ $0.00 (0.00%)</div>
      </div>
      <div style="text-align:right">
        <div class="hlabel">Cash</div>
        <div class="hcash" id="ch">$100.00</div>
        <div class="hmeta" id="ss">Not synced</div>
      </div>
    </div>
    <div id="tkbar"><div class="tkscroll" id="tk"></div></div>
    <div id="tabbar">
      <button class="tp on" data-p="dash" onclick="go('dash')">Portfolio</button>
      <button class="tp" data-p="mkt" onclick="go('mkt')">Markets</button>
      <button class="tp" data-p="ai" onclick="go('ai')">AI Advisor</button>
      <button class="tp" data-p="sync" onclick="go('sync')">Sync Robinhood</button>
      <button class="tp" data-p="alerts" onclick="go('alerts')">Alerts</button>
    </div>
  </div>
  <div id="pg"></div>
  <nav id="nav">
    <button class="nb on" data-p="dash" onclick="go('dash')"><span class="nbi">◈</span>Portfolio</button>
    <button class="nb" data-p="mkt" onclick="go('mkt')"><span class="nbi">◉</span>Markets</button>
    <button class="nb" data-p="ai" onclick="go('ai')"><span class="nbi">⟁</span>Advisor</button>
    <button class="nb" data-p="sync" onclick="go('sync')"><span class="nbi">⇄</span>Sync</button>
    <button class="nb" data-p="alerts" onclick="go('alerts')"><span class="nbi">◎</span>Alerts</button>
  </nav>
</div>

<!-- Trade Modal -->
<div class="mover" id="tmod" style="display:none" onclick="if(event.target===this)cmod()">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="clabel" id="mlbl" style="margin-bottom:12px">BUY · NVDA</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <div><div style="font-family:var(--mono);font-size:22px" id="mpr">$0.00</div><div style="font-size:11px;color:var(--mu)">per share</div></div>
      <div style="text-align:right"><div style="font-family:var(--mono);font-size:13px;color:var(--mu)" id="mca">Cash: $0</div></div>
    </div>
    <div class="ttog"><button class="ttb on" id="tbd" onclick="stt('d')">$ Dollars</button><button class="ttb" id="tbs" onclick="stt('s')"># Shares</button></div>
    <input class="tinput" id="tqty" type="number" inputmode="decimal" placeholder="0.00" oninput="ctc()"/>
    <div id="tcc" style="text-align:center;font-family:var(--mono);font-size:12px;color:var(--mu);min-height:18px;margin-bottom:14px"></div>
    <div class="trow">
      <button class="btno" style="flex:1" onclick="cmod()">Cancel</button>
      <button class="btn btng" style="flex:2;margin-left:0" id="tcb" onclick="dtrade()">CONFIRM</button>
    </div>
  </div>
</div>
<div id="toasts"></div>

<script>
// ─── INLINE MANIFEST (injected into <head>) ─────────────────
(function(){
  const m={name:"StockAI — Daily Advisor",short_name:"StockAI",start_url:location.href,display:"standalone",background_color:"#07080f",theme_color:"#07080f",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='38' fill='%2307080f'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle'%3E📈%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml",purpose:"any maskable"},{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%2307080f'/%3E%3Ctext x='256' y='350' font-size='290' text-anchor='middle'%3E📈%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
  const blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
  const link=document.createElement('link');
  link.rel='manifest'; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
})();

// ─── INLINE SERVICE WORKER ───────────────────────────────────
(function(){
  if(!('serviceWorker' in navigator)) return;
  const sw=`
const C='sai3';
const A=['${location.href}'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)));self.skipWaiting()});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim()});
self.addEventListener('fetch',e=>{if(e.request.url.includes('api.anthropic')||e.request.url.includes('fonts.google'))return;e.respondWith(caches.match(e.request).then(h=>h||fetch(e.request).catch(()=>caches.match('${location.href}'))))});
self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.matchAll({type:'window',includeUncontrolled:true}).then(cl=>{if(cl.length){cl[0].focus();cl[0].postMessage({tab:'ai'})}else clients.openWindow('${location.href}')}))});
  `;
  const blob=new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'/'}).catch(()=>{});
})();

// ─── STATE ───────────────────────────────────────────────────
// ─── PERSISTENT KEY — never changes so updates never wipe data ──
const SK='stockai_joel';

// ─── DEFAULT HOLDINGS — Joel's real Robinhood portfolio ──────
const DEFAULTS={
  cash:30.29,
  startValue:366.24,
  lastSync:'Mar 17, 5:48 PM',
  syncedFrom:'Robinhood screenshot',
  holdings:[
    {s:'SNAP', sh:5,      avg:4.66},
    {s:'CLNE', sh:10,     avg:2.17},
    {s:'ERIC', sh:5,      avg:11.76},
    {s:'IMAQ', sh:5,      avg:10.19},
    {s:'TXMD', sh:1,      avg:2.23},
    {s:'TTWO', sh:0.0406, avg:206.72},
    {s:'HUMA', sh:15,     avg:1.17},
    {s:'SPRU', sh:0.625,  avg:3.78},
    {s:'HYLN', sh:10,     avg:1.94},
    {s:'OGI',  sh:2.50,   avg:1.45},
    {s:'LONA', sh:1,      avg:11.61},
    {s:'CHAI', sh:2.50,   avg:1.51},
    {s:'TLRY', sh:0.40,   avg:6.94},
  ],
  history:[{d:'Mar 13',v:358.2},{d:'Mar 14',v:362.77},{d:'Mar 17',v:366.24}],
  advice:null, notifOn:false, portfolioChanged:false
};

// ─── LOAD — check ALL old keys + current, merge with defaults ─
function loadState(){
  // try current key first, then all old versioned keys
  const keys=['stockai_joel','sai8','sai7','sai6','sai5','sai4','sai3'];
  for(const k of keys){
    try{
      const raw=localStorage.getItem(k);
      if(!raw) continue;
      const d=JSON.parse(raw);
      if(!d) continue;
      // valid saved state — merge with defaults for any missing fields
      const merged={...DEFAULTS,...d};
      // ensure holdings always exist and are non-empty
      if(!merged.holdings||merged.holdings.length===0) merged.holdings=DEFAULTS.holdings;
      if(!merged.history||merged.history.length<2) merged.history=DEFAULTS.history;
      if(!merged.startValue) merged.startValue=DEFAULTS.startValue;
      // migrate to current key
      try{localStorage.setItem(SK,JSON.stringify(merged))}catch(e){}
      return merged;
    }catch(e){continue}
  }
  return null;
}

let S=loadState()||{...DEFAULTS};
function sv(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}

// ─── PRICES ──────────────────────────────────────────────────
const TK=[
  // Joel's actual holdings
  {s:'SNAP', n:'Snap Inc', sec:'Social', b:4.66},
  {s:'CLNE', n:'Clean Energy',  sec:'Energy',   b:2.17},
  {s:'ERIC', n:'Ericsson',      sec:'Telecom',  b:11.76},
  {s:'OPTT', n:'Ocean Power',   sec:'Energy',   b:0.39},
  {s:'IMAQ', n:'Int\'l General',sec:'Spec',     b:10.19},
  {s:'TTWO', n:'Take-Two',      sec:'Gaming',   b:206.72},
  {s:'HUMA', n:'Humacyte', sec:'Biotech', b:1.17},
  {s:'HYLN', n:'Hyliion',       sec:'EV',       b:1.94},
  {s:'BYND', n:'Beyond Meat',   sec:'Food',     b:0.75},
  {s:'TLRY', n:'Tilray', sec:'Cannabis', b:6.94},
  {s:'LONA', n:'Lona Systems', sec:'Tech', b:11.61},
  // Watchlist
  {s:'SPY',  n:'S&P 500 ETF',   sec:'ETF',      b:528},
  {s:'QQQ',  n:'Nasdaq ETF',    sec:'ETF',      b:458},
  {s:'NVDA', n:'NVIDIA',        sec:'Tech',     b:875},
  {s:'AAPL', n:'Apple',         sec:'Tech',     b:189},
];
let P={};
function sr(s){return s.split('').reduce((a,c)=>a+c.charCodeAt(0),0)}
function ip(){
  TK.forEach(t=>{
    const sd=sr(t.s),v=((sd%20)-10)/100;
    const chg=+((Math.random()-.47)*2.8).toFixed(2);
    P[t.s]={p:+(t.b*(1+v+(Math.random()-.5)*.03)).toFixed(2),c:chg};
  });
}
function tv(){return S.cash+S.holdings.reduce((s,h)=>s+h.sh*(P[h.s]?.p||h.avg),0)}
function startVal(){return S.startValue||JOEL_TOTAL}

// ─── HEADER ──────────────────────────────────────────────────
function uh(){
  const v=tv(),d=v-startVal(),pct=(d/startVal()*100).toFixed(2),up=d>=0;
  document.getElementById('tv').textContent=v.toFixed(2);
  document.getElementById('tv').style.color=up?'var(--g)':'var(--r)';
  document.getElementById('tvchg').textContent=`${up?'▲':'▼'} $${Math.abs(d).toFixed(2)} (${up?'+':''}${pct}%) total`;
  document.getElementById('tvchg').style.color=up?'var(--g)':'var(--r)';
  document.getElementById('ch').textContent=`$${S.cash.toFixed(2)}`;
  document.getElementById('ss').textContent=S.lastSync?`Synced ${S.lastSync}`:'Not synced';
  const now=new Date(),et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const h=et.getHours(),m=et.getMinutes(),d2=et.getDay();
  const open=h>9||(h===9&&m>=30),close=h<16,wk=d2>0&&d2<6;
  const el=document.getElementById('mstat');
  el.textContent=wk&&open&&close?'MARKET OPEN':'MARKET CLOSED';

function doTextSync(){
  const txt=document.getElementById('ptxt')?.value||'';
  const cashVal=parseFloat(document.getElementById('pcash')?.value);
  if(!txt.trim()){toast('Paste your positions first','err');return}
  const lines=txt.trim().split('\n').filter(l=>l.trim());
  const parsed=[];
  for(const line of lines){
    const tokens=line.replace(/[$,]/g,'').split(/[\s,\t|]+/).filter(Boolean);
    let sym='',nums=[];
    for(const t of tokens){
      if(/^[A-Z]{1,6}$/.test(t.toUpperCase())&&isNaN(t)) sym=t.toUpperCase();
      else if(!isNaN(parseFloat(t))) nums.push(parseFloat(t));
    }
    if(sym&&nums.length>=2) parsed.push({s:sym,sh:nums[0],avg:nums[1]});
    else if(sym&&nums.length===1) parsed.push({s:sym,sh:nums[0],avg:0});
  }
  if(!parsed.length){toast('Could not read positions — check format','err');return}
  const valid=parsed.filter(h=>h.avg>0);
  const skipped=parsed.length-valid.length;
  S.holdings=valid;
  if(!isNaN(cashVal)&&cashVal>=0) S.cash=+cashVal.toFixed(2);
  S.lastSync=new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  S.syncedFrom='Paste import';
  S.history.push({d:'Sync',v:tv()});
  sv();
  toast(`Synced ${valid.length} positions${skipped?' ('+skipped+' $0 skipped)':''}  \u2713`,'ok');
  S.advice=null;  // clear stale advice after sync
  S.portfolioChanged=true;
  setTimeout(fetchLivePrices,600);
  go('dash');
}
function removeHolding(sym){
  S.holdings=S.holdings.filter(h=>h.s!==sym);
  S.advice=null; S.portfolioChanged=true;
  sv();render();toast('Removed '+sym,'ok');
}
function addHoldingPrompt(){
  const sym=prompt('Stock symbol (e.g. AAPL):')?.toUpperCase().trim();
  if(!sym)return;
  const sh=parseFloat(prompt('Number of shares:'));
  if(isNaN(sh)||sh<=0)return;
  const price=parseFloat(prompt('Avg cost per share ($):'));
  if(isNaN(price))return;
  const ex=S.holdings.find(h=>h.s===sym);
  if(ex){ex.sh=sh;ex.avg=price;}else S.holdings.push({s:sym,sh,avg:price});
  sv();render();toast('Added '+sym,'ok');
}


// ─── ALERTS ──────────────────────────────────────────────────
const ATIMES=[
  {id:'open',lbl:'Market Open',t:'9:30 AM ET',em:'🔔',desc:'Run AI analysis at open',h:9,m:30},
  {id:'mid', lbl:'Midday Check',t:'12:30 PM ET',em:'☀️',desc:'Mid-session review',h:12,m:30},
  {id:'close',lbl:'Pre-Close Alert',t:'3:00 PM ET',em:'⏰',desc:'Last trades before close',h:15,m:0},
];
function nextAlert(){
  const now=new Date(),et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const d=et.getDay();if(d===0||d===6)return null;
  for(const a of ATIMES){
    const diff=(a.h*60+a.m)-(et.getHours()*60+et.getMinutes());
    if(diff>0){const h=Math.floor(diff/60),m=diff%60;return{...a,cd:`in ${h?h+'h ':''}${m}m`}}
  }
  return{...ATIMES[0],cd:'tomorrow'};
}
function rAlerts(c){
  const hp=Notification.permission==='granted';
  const hb=Notification.permission==='denied';
  const na=nextAlert();
  c.innerHTML=`
    ${hb?`<div class="card cr"><div class="clabel" style="color:var(--r)">Notifications Blocked</div><div style="font-size:13px;color:#8899cc;line-height:1.5">Go to <strong>Chrome ⋮ → Settings → Site Settings → Notifications</strong> and allow this site.</div></div>`:''}
    ${!hp&&!hb?`<div class="card cb"><div class="clabel">Enable Market Alerts</div><div style="font-size:13px;color:#8899cc;line-height:1.5;margin-bottom:14px">Get notified at 3 key market windows daily so you never miss a trade opportunity.</div><button class="btn btng" onclick="reqN()">🔔 Enable Notifications</button></div>`:''}
    ${hp&&na?`<div class="card cg"><div class="clabel">Next Alert</div><div style="font-family:var(--mono);font-size:22px;color:var(--g)">${na.em} ${na.t}</div><div style="font-size:12px;color:var(--mu);margin-top:4px">${na.lbl} · ${na.cd}</div></div>`:''}
    <div class="card"><div class="clabel">Daily Schedule</div>
      ${ATIMES.map(a=>`<div class="nrow">
        <div><div style="font-size:14px;font-weight:600">${a.em} ${a.lbl}</div>
          <div style="font-size:11px;color:var(--mu);margin-top:2px">${a.desc}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:7px">
          <span class="npill ${hp?'npg':'npm'}"><span style="font-size:8px">${hp?'●':'○'}</span>${a.t}</span>
          ${hp?`<button class="btno" style="padding:5px 11px;font-size:11px" onclick="testN('${a.id}')">Test</button>`:''}
        </div>
      </div>`).join('')}
    </div>
    <div class="card"><div class="clabel">📱 How It Works on Android</div>
      <div style="font-size:13px;color:#8899cc;line-height:1.85">
        <strong style="color:var(--tx)">Step 1</strong> — Enable notifications above<br>
        <strong style="color:var(--tx)">Step 2</strong> — Chrome ⋮ menu → "Add to Home Screen"<br>
        <strong style="color:var(--tx)">Step 3</strong> — Open the app once per day (morning works best)<br>
        <strong style="color:var(--tx)">Step 4</strong> — Alerts fire automatically at market times<br><br>
        Tapping a notification opens the AI Advisor directly.
      </div>
    </div>
    ${hp?`<button class="btno" style="width:100%;margin-bottom:8px" onclick="schedAll()">↺ Reschedule Today's Alerts</button>`:''}`;
}
async function reqN(){
  if(!('Notification' in window)){toast('Not supported in this browser','err');return}
  const p=await Notification.requestPermission();
  if(p==='granted'){S.notifOn=true;sv();schedAll();toast('Alerts enabled! 🔔','ok');render()}
  else{toast('Permission denied — check Chrome site settings','err');render()}
}
function schedAll(){
  if(Notification.permission!=='granted')return;
  const now=new Date(),et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const msgs={open:'Market Open 🔔 Run your AI analysis — markets just opened!',mid:'Midday Check ☀️ Mid-session review — any trades to make?',close:'Pre-Close ⏰ 1 hour left — execute any final trades before close!'};
  let n=0;
  ATIMES.forEach(a=>{
    const tgt=new Date(et);tgt.setHours(a.h,a.m,0,0);
    const etOff=et.getTime()-now.getTime();
    const local=new Date(tgt.getTime()-etOff);
    const delay=local.getTime()-now.getTime();
    if(delay>0&&delay<9*60*60*1000){setTimeout(()=>fireN(a.id,msgs[a.id]),delay);n++}
  });
  if(n>0)toast(`${n} alert${n>1?'s':''} scheduled for today`,'ok');
  else toast('No more alerts today — opens again tomorrow','inf');
}
function fireN(id,msg){
  if(Notification.permission!=='granted')return;
  const n=new Notification('StockAI',{body:msg,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%2307080f"/><text x="32" y="44" font-size="36" text-anchor="middle">📈</text></svg>',tag:id,requireInteraction:true});
  n.onclick=()=>{window.focus();go('ai');n.close()};
}
function testN(id){const msgs={open:'Market Open 🔔 Test alert!',mid:'Midday Check ☀️ Test alert!',close:'Pre-Close ⏰ Test alert!'};fireN(id,msgs[id]);toast('Test notification sent','ok')}

// ─── TRADE MODAL ─────────────────────────────────────────────
let ts={a:'BUY',s:'',m:'d'};
function omod(action,sym,sug){
  ts={a:action,s:sym,m:'d'};
  const p=P[sym]?.p||0;
  document.getElementById('mlbl').textContent=`${action} · ${sym}`;
  document.getElementById('mpr').textContent=`$${p.toFixed(2)}`;
  document.getElementById('mca').textContent=`Cash: $${S.cash.toFixed(2)}`;
  document.getElementById('tqty').value=sug||'';
  document.getElementById('tcc').textContent='';
  stt('d');
  const b=document.getElementById('tcb');
  b.textContent=`CONFIRM ${action}`;
  b.style.background=action==='BUY'?'var(--g)':'var(--r)';
  b.style.color=action==='BUY'?'#000':'#fff';
  document.getElementById('tmod').style.display='flex';
  setTimeout(()=>document.getElementById('tqty').focus(),300);
}
function cmod(){document.getElementById('tmod').style.display='none'}
function stt(m){
  ts.m=m;
  document.getElementById('tbd').classList.toggle('on',m==='d');
  document.getElementById('tbs').classList.toggle('on',m==='s');
  document.getElementById('tqty').placeholder=m==='d'?'Amount in $':'# of shares';
  ctc();
}
function ctc(){
  const q=parseFloat(document.getElementById('tqty').value),p=P[ts.s]?.p||0;
  const el=document.getElementById('tcc');
  if(!q||!p){el.textContent='';return}
  el.textContent=ts.m==='d'?`≈ ${(q/p).toFixed(4)} shares`:`≈ $${(q*p).toFixed(2)}`;
}
function dtrade(){
  const raw=parseFloat(document.getElementById('tqty').value);
  if(isNaN(raw)||raw<=0){toast('Enter a valid amount','err');return}
  const p=P[ts.s]?.p||0,{a,s,m}=ts;
  let dol=m==='d'?raw:raw*p,sh=dol/p;
  if(a==='BUY'){
    if(dol>S.cash){toast('Insufficient cash','err');return}
    const ex=S.holdings.find(h=>h.s===s);
    if(ex){ex.avg=+((ex.avg*ex.sh+dol)/(ex.sh+sh)).toFixed(4);ex.sh=+(ex.sh+sh).toFixed(6)}
    else S.holdings.push({s,sh:+sh.toFixed(6),avg:+p.toFixed(2)});
    S.cash=+(S.cash-dol).toFixed(2);
    toast(`Bought $${dol.toFixed(2)} of ${s}`,'ok');
  }else{
    const h=S.holdings.find(h=>h.s===s);
    if(!h){toast('No position to sell','err');return}
    const ss2=Math.min(sh,h.sh),proc=+(ss2*p).toFixed(2);
    S.cash=+(S.cash+proc).toFixed(2);h.sh=+(h.sh-ss2).toFixed(6);
    S.holdings=S.holdings.filter(h=>h.sh>0.0001);
    toast(`Sold $${proc.toFixed(2)} of ${s}`,'ok');
  }
  S.advice=null;  // clear stale advice after trade
  S.portfolioChanged=true;
  cmod();sv();render();
}

// ─── TOAST ───────────────────────────────────────────────────
function toast(msg,type='ok'){
  const t=document.createElement('div');
  t.className=`toast t${type}`;t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),3200);
}
